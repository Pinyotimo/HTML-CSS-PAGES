<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Privacy Display Effect</title>
    <style>
        /* Base Reset & Center alignment framework */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #080710;
            color: #ffffff;
            font-family: 'Segoe UI', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            perspective: 1000px; /* Crucial for 3D rotation depths */
        }

        .instructions {
            margin-bottom: 2rem;
            text-align: center;
            color: #8a8a93;
            font-size: 0.9rem;
            letter-spacing: 0.05em;
        }

        /* 3D Scene Wrapper Box */
        .stage {
            position: relative;
            width: 300px;
            height: 600px;
            transition: transform 0.1s ease-out;
            transform-style: preserve-3d;
        }

        /* Phone Body Chassis */
        .phone {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: #1c1c1e;
            border-radius: 40px;
            padding: 12px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.7);
            border: 4px solid #2c2c2e;
        }

        /* Hardware Details (Notch, Camera lens) */
        .phone-hardware {
            position: relative;
            width: 100%;
            z-index: 20;
        }

        .speaker {
            position: absolute;
            top: 6px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 4px;
            background-color: #3a3a3c;
            border-radius: 2px;
        }

        .camera-dot {
            position: absolute;
            top: 4px;
            left: calc(50% + 40px);
            width: 8px;
            height: 8px;
            background-color: #0b132b;
            border-radius: 50%;
        }

        /* Main Display Screen Engine */
        .screen {
            position: relative;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1e1b4b 0%, #311042 100%);
            border-radius: 32px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        /* Status Top-bar Layout */
        .status-bar {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 40px;
        }

        /* Protected On-Screen Interface Details */
        .glass-ui {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .glass-ui h1 {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(90deg, #38bdf8, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .glass-ui p {
            font-size: 0.9rem;
            line-height: 1.5;
            color: #e2e8f0;
        }

        /* The Privacy Filtering Overlay Component */
        .privacy-overlay {
            position: absolute;
            inset: 0;
            background-color: #000000;
            border-radius: 32px;
            pointer-events: none; /* Allows click-through interaction access */
            z-index: 15;
            opacity: 0; /* Clear when viewed directly forward */
            transition: opacity 0.15s ease-out;
        }
    </style>
</head>
<body>

    <div class="instructions">
        <p>← Move mouse cursor left and right to tilt phone screen →</p>
    </div>

    <!-- Active Intersection Stage Container -->
    <section class="stage" id="stage">
        
        <article class="phone">
            <!-- Top Hardware Bezel Layer -->
            <div class="phone-hardware">
                <span class="speaker"></span>
                <span class="camera-dot"></span>
            </div>

            <!-- Light Emission Matrix Screen Box -->
            <div class="screen" id="screen">
                <header class="status-bar">
                    <span>09:41</span>
                    <span>5G 🔋</span>
                </header>

                <section class="glass-ui">
                    <h1>PRIVACY DISPLAY</h1>
                    <p>This confidential data panel automatically blanks out when viewed from extreme off-axis presentation angles.</p>
                </section>
                
                <!-- Dynamic Polarizing Screen Mask Overlay Element -->
                <div class="privacy-overlay" id="privacyOverlay"></div>
            </div>
        </article>
        
    </section>

    <!-- Mathematical Matrix Rotation Calculations Controller -->
    <script>
        const stage = document.getElementById('stage');
        const privacyOverlay = document.getElementById('privacyOverlay');

        document.addEventListener('mousemove', (e) => {
            // Calculate mouse horizontal location relative to center viewpoint coordinates (0.00 base offset)
            const xAxis = (window.innerWidth / 2 - e.pageX) / 15; 
            const yAxis = (window.innerHeight / 2 - e.pageY) / 25;
            
            // Apply 3D matrix space transformations onto hardware container element
            stage.style.transform = `rotateY(${-xAxis}deg) rotateX(${yAxis}deg)`;

            // Compute absolute rotation angle magnitude metric 
            const rotationIntensity = Math.abs(xAxis);
            
            // Dynamic Opacity calculation multiplier rule
            let targetOpacity = 0;
            if (rotationIntensity > 10) {
                // Progressively darkens screen contents past the 10-degree mark cutoff
                targetOpacity = (rotationIntensity - 10) / 25;
            }
            
            // Cap maximum filter occlusion density opacity to 96%
            privacyOverlay.style.opacity = Math.min(targetOpacity, 0.96);
        });

        // Clean-up normalization helper resets structural orientation when mouse exits browser view space
        document.addEventListener('mouseleave', () => {
            stage.style.transform = 'rotateY(0deg) rotateX(0deg)';
            privacyOverlay.style.opacity = 0;
        });
    </script>
</body>
</html>
