<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinite Carousel Animation</title>
    <style>
        /* Document Layout Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0d0b21;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        /* Carousel Base Structural Rules from Snippet */
        .carousel {
            margin: 100px auto;
            width: 90%;
            overflow: hidden;
            display: flex;
            gap: 1rem;
            border-radius: 20px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            padding: 20px;
            position: relative;
        }

        /* Animation Group Wrapper */
        .group {
            display: flex;
            gap: 1rem;
            flex-shrink: 0;
            min-width: 100%;
            /* Infinite translation scrolling framework */
            animation: scroll-left 20s linear infinite;
        }

        /* Card Sizing Layout blocks */
        .card {
            width: 150px;
            height: 220px;
            flex-shrink: 0;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: scale(1.05);
        }

        /* Image Mask Layering rules */
        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
        }

        /* CSS Keyframes for Infinite Loop Mechanics */
        @keyframes scroll-left {
            0% {
                transform: translateX(0);
            }
            100% {
                transform: translateX(calc(-100% - 1rem));
            }
        }

        /* Pause animation scroll effect when user hovers over carousel box */
        .carousel:hover .group {
            animation-play-state: paused;
        }
    </style>
</head>
<body>

    <div class="carousel">
        <!-- Main Set Group -->
        <div class="group">
            <div class="card"><img src="https://images.pexels.com/photos/31888588/pexels-photo-31888588.jpeg" alt="Image 1"></div>
            <div class="card"><img src="https://images.pexels.com/photos/31780330/pexels-photo-31780330.jpeg" alt="Image 2"></div>
            <div class="card"><img src="https://images.pexels.com/photos/17474931/pexels-photo-17474931.jpeg" alt="Image 3"></div>
            <div class="card"><img src="https://images.pexels.com/photos/206359/pexels-photo-206359.jpeg" alt="Image 4"></div>
            <div class="card"><img src="https://images.pexels.com/photos/10812644/pexels-photo-10812644.jpeg" alt="Image 5"></div>
            <div class="card"><img src="https://images.pexels.com/photos/1103968/pexels-photo-1103968.jpeg" alt="Image 6"></div>
        </div>
        
        <!-- Duplicate Set Group (Ensures Seamless Infinite Loop Tiling) -->
        <div class="group" aria-hidden="true">
            <div class="card"><img src="https://images.pexels.com/photos/31888588/pexels-photo-31888588.jpeg" alt="Image 1"></div>
            <div class="card"><img src="https://images.pexels.com/photos/31780330/pexels-photo-31780330.jpeg" alt="Image 2"></div>
            <div class="card"><img src="https://images.pexels.com/photos/17474931/pexels-photo-17474931.jpeg" alt="Image 3"></div>
            <div class="card"><img src="https://images.pexels.com/photos/206359/pexels-photo-206359.jpeg" alt="Image 4"></div>
            <div class="card"><img src="https://images.pexels.com/photos/10812644/pexels-photo-10812644.jpeg" alt="Image 5"></div>
            <div class="card"><img src="https://images.pexels.com/photos/1103968/pexels-photo-1103968.jpeg" alt="Image 6"></div>
        </div>
    </div>

</body>
</html>
